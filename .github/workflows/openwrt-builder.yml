name: Build ImmortalWrt for K2

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 20 * * 0'

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  CONFIG_FILE: configs/k2.config
  DIY_PART1: scripts/diy-part1.sh
  DIY_PART2: scripts/diy-part2.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gettext git libelf-dev libncurses5-dev libssl-dev \
            python3 python3-distutils python3-pyelftools python3-setuptools \
            rsync swig unzip zlib1g-dev file wget
          mkdir -p $HOME/openwrt

      - name: Clone source code
        run: |
          git clone --depth=1 --branch ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }} $HOME/openwrt

      - name: Load custom feeds (diy-part1)
        run: |
          chmod +x ${{ env.DIY_PART1 }}
          ${{ env.DIY_PART1 }} $HOME/openwrt

      - name: Update feeds
        run: |
          cd $HOME/openwrt
          ./scripts/feeds update -a

      - name: Load custom config (diy-part2)
        run: |
          chmod +x ${{ env.DIY_PART2 }}
          ${{ env.DIY_PART2 }} $HOME/openwrt

      - name: Install feeds
        run: |
          cd $HOME/openwrt
          ./scripts/feeds install -a

      # --- 清除就配置残留 ---
      - name: Remove old config
        run: rm -f $HOME/openwrt/.config

      - name: Copy config file
        run: |
          cp ${{ env.CONFIG_FILE }} $HOME/openwrt/.config

      - name: Light clean
        run: |
          # 清理当前目录（如果源码在根目录）
          rm -rf tmp/ staging_dir/ build_dir/ 2>/dev/null || true
    
          # 清理常见子目录（openwrt / immortalwrt / lede）
          for dir in openwrt immortalwrt lede; do
          if [ -d "$dir" ]; then
          rm -rf "$dir"/tmp/ "$dir"/staging_dir/ "$dir"/build_dir/
          fi
          done
    
          echo "Clean completed"

      - name: Generate full config
        run: |
          cd $HOME/openwrt
          make defconfig

      - name: Build firmware
        run: |
          cd $HOME/openwrt
          make -j$(nproc) || make -j4 V=s

      # ---- 步骤11：收集并上传固件（修正路径和缩进） ----
      - name: Collect firmware files
        run: |
          cd $HOME/openwrt
          # 将文件复制到 GitHub Actions 默认能识别的工作区
          mkdir -p ${{ github.workspace }}/artifacts
          find bin -name "*.bin" -type f -exec cp {} ${{ github.workspace }}/artifacts/ \;
          
          # 修正 if/else 的 shell 缩进，使其更易读
          if [ -z "$(ls -A ${{ github.workspace }}/artifacts)" ]; then
            echo "❌ 错误：没有找到任何 .bin 文件，编译可能失败！"
            exit 1
          else
            echo "✅ 找到以下固件文件："
            ls -lh ${{ github.workspace }}/artifacts/
          fi

      # ---- 新增步骤：安全地生成日期变量 ----
      - name: Generate date variable
        run: |
          echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

      # ---- 步骤12：上传 Artifacts ----
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          # 使用上一步生成的日期变量
          name: K2-ImmortalWrt-${{ env.BUILD_DATE }}
          # 路径直接相对于 workspace
          path: artifacts/*.bin
          retention-days: 30
